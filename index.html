<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />
    <title>Quiz Seite</title>
    <link rel="stylesheet"
          href="quiz.css" />
    <script src="quiz.js"
            type="module"></script>
</head>

<body>
    <div class="container">
        <h1>
            <button type="button"
                    id="start-button">Quiz starten</button>
        </h1>
        <div class="dropdown-container">
            <label for="category">Wähle eine Kategorie:</label>
            <select id="category">
                <option value="11">Film</option>
                <option value="24">Politik</option>
                <option value="17">Wissenschaft</option>
                <option value="23">Geschichte</option>
                <option value="21">Sport</option>
            </select>
        </div>

        <!-- Eingabe für die Anzahl der Fragen -->
        <div class="question-count-container">
            <label for="question-count">Anzahl der Fragen:</label>
            <input type="number"
                   id="question-count"
                   min="1"
                   max="20"
                   value="5">
        </div>

        <div id="question-container"
             class="hidden">
            <div id="header">
                <div>
                    <span id="question-number">1/14</span>
                </div>
                <div>
                    <span id="timer">00:00</span>
                </div>
            </div>
            <h2 id="question"></h2>
            <div id="options"></div>
        </div>

        <div id="weiter-container">
            <button id="weiter-btn"
                    class="hidden">Nächste Frage</button>
            <button id="restart-btn"
                    class="hidden">Quiz neu starten</button>
        </div>
    </div>
</body>

</html>
